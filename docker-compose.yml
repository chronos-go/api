services:
  postgres:
    image: postgres:16
    container_name: chronos-postgres
    environment:
      POSTGRES_DB: chronos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - chronos-postgres-data:/var/lib/postgresql/data
      - ./db/docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chronos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chronos-postgres-data:
