name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chronos
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d chronos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/chronos?sslmode=disable
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      JWT_ISSUER: chronos-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Download dependencies
        run: go mod download

      - name: Set up Atlas
        uses: ariga/setup-atlas@v0

      - name: Apply migrations
        run: atlas migrate apply --url "$DATABASE_URL" --dir "file://db/migrations"

      - name: Set up sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.31.1"

      - name: Verify generated sqlc code
        run: |
          sqlc generate
          git diff --exit-code -- internal/db

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
